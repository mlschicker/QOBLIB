name: Build GitHub Pages

# The public site is (re)built and deployed only when changes land on main
# (i.e. a PR is merged) or on a manual dispatch — never on pull requests. PRs are
# validated by the "Validate Submission" workflow instead.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Run unit tests
        run: uv run --project misc python -m unittest discover -s tests

      - name: Build site
        env:
          SITE_REPO_URL: ${{ format('{0}/{1}', github.server_url, github.repository) }}
          SITE_REF: ${{ github.sha }}
        run: uv run --project misc qoblib-build-site --out _site --repo-url "$SITE_REPO_URL" --ref "$SITE_REF"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
