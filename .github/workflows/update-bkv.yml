name: Update best-known records

# After a submission lands on main, recompute each problem's best-known values,
# copy any improving submission solution file into the problem's solutions/ folder,
# regenerate the attributed table inside solutions/README.md, and commit it to main.
#
# The best-known value is awarded to the FIRST source that reached it: curated
# reference solutions are the baseline, so a submission only takes attribution when
# it is the earliest source to strictly improve the previous best. See
# misc/ci/CHECKER_CONTRACT.md and misc/ci/update_bkv.py for details.
#
# This runs on pushes that touch submissions/**; the commit it makes only touches
# solutions/**, so it never re-triggers itself.

on:
  push:
    branches: [main]
    paths:
      - "**/submissions/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bkv
  cancel-in-progress: false

jobs:
  update-bkv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Recompute best-known records
        id: bkv
        shell: bash
        run: |
          set -euo pipefail
          SUMMARY="$RUNNER_TEMP/bkv-summary.txt"
          uv run --project misc qoblib-update-bkv --summary-file "$SUMMARY"

          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
            echo "No best-known changes to commit."
            exit 0
          fi
          echo "changed=1" >> "$GITHUB_OUTPUT"

          {
            echo "## 📈 Best-known records updated"
            echo ""
            echo "Files changed under \`*/solutions/\`:"
            echo ""
            echo '```'
            git -c color.ui=never status --short -- ':(glob)**/solutions/**'
            echo '```'
            echo ""
            echo "Details:"
            echo ""
            echo '```'
            cat "$SUMMARY"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Stash the change list for the commit body.
          cp "$SUMMARY" "$RUNNER_TEMP/commit-body.txt"

      - name: Commit and push
        if: steps.bkv.outputs.changed == '1'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':(glob)**/solutions/**'

          {
            echo "chore(bkv): update best-known records"
            echo ""
            echo "Auto-generated by .github/workflows/update-bkv.yml (misc/ci/update_bkv.py)."
            echo "Best-known values are attributed to the first source to reach them."
            echo ""
            cat "$RUNNER_TEMP/commit-body.txt"
          } > "$RUNNER_TEMP/commit-msg.txt"

          git commit -F "$RUNNER_TEMP/commit-msg.txt"
          git push origin HEAD:main
